services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - coolify

  # Backend API -- not exposed to host; Traefik proxies to frontend which proxies to it internally
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: production
    depends_on:
      - redis
    networks:
      - coolify
    restart: unless-stopped

  # Frontend -- nginx serves built Vite output and proxies /api + /ws to backend.
  # Traefik labels explicitly set the upstream port (3000) so Coolify's auto-inject
  # cannot override it with the default port 80.
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.finplan-frontend.rule=Host(`finplan.snaith.io`)"
      - "traefik.http.routers.finplan-frontend.entrypoints=http"
      - "traefik.http.services.finplan-frontend.loadbalancer.server.port=3000"

networks:
  coolify:
    external: true
