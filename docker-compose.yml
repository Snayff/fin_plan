services:
  # Backend API -- not exposed to host; nginx proxies to it internally
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: production
    networks:
      - finplan-network
    restart: unless-stopped

  # Frontend -- nginx serves built Vite output and proxies /api + /ws to backend
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finplan-network
    restart: unless-stopped

networks:
  finplan-network:
    driver: bridge
