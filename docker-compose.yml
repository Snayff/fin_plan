services:
  # Backend API -- not exposed to host; nginx proxies to it internally
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: production
    networks:
      - coolify
    restart: unless-stopped

  # Frontend -- nginx serves built Vite output and proxies /api + /ws to backend
  # No host port binding: Coolify's Caddy proxy already owns port 80/443 on the
  # host and routes to this container based on the configured FQDN.
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
