name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [stage]
  push:
    branches: [stage, production]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Lint & Type Check (runs on PRs)
  # ─────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && bunx prisma generate

      - name: Lint
        run: bun run lint

      - name: Type Check
        run: bun run type-check

  # ─────────────────────────────────────────
  # Tests (runs on PRs)
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finplan
          POSTGRES_PASSWORD: finplan_dev_password
          POSTGRES_DB: finplan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finplan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://finplan:finplan_dev_password@localhost:5432/finplan_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-that-is-at-least-32-characters-long-for-testing
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-that-is-at-least-32-characters-long-for-testing
      COOKIE_SECRET: test-cookie-secret-that-is-at-least-32-characters-long-for-testing
      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && bunx prisma generate

      - name: Push schema to test database
        run: cd apps/backend && bunx prisma db push

      - name: Run tests with coverage
        run: cd apps/backend && bun scripts/run-tests.ts --coverage

      - name: Upload coverage slice
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage-current.json

  # ─────────────────────────────────────────
  # Frontend Tests (runs on PRs)
  # ─────────────────────────────────────────
  test-frontend:
    name: Frontend Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Frontend tests mock HTTP with MSW — no database or Prisma client needed.
      - name: Run tests with coverage
        run: cd apps/frontend && bun scripts/run-tests.ts --coverage

      - name: Upload coverage slice
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage-current.json

  # ─────────────────────────────────────────
  # Shared Package Tests (runs on PRs)
  # ─────────────────────────────────────────
  test-shared:
    name: Shared Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: cd packages/shared && bun run test:coverage:ci

      - name: Upload coverage slice
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: coverage-current.json

  # ─────────────────────────────────────────
  # Coverage Gate — merge slices, enforce floor & ratchet (runs on PRs)
  # ─────────────────────────────────────────
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [test, test-frontend, test-shared]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Download backend coverage slice
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: coverage-backend

      - name: Download frontend coverage slice
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: coverage-frontend

      - name: Download shared coverage slice
        uses: actions/download-artifact@v4
        with:
          name: coverage-shared
          path: coverage-shared

      - name: Merge coverage slices
        run: |
          bun scripts/merge-coverage.ts coverage-current.json \
            coverage-backend/coverage-current.json \
            coverage-frontend/coverage-current.json \
            coverage-shared/coverage-current.json

      - name: Check coverage floor & ratchet
        run: bun scripts/check-coverage.ts coverage-current.json

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-current.json

  # ─────────────────────────────────────────
  # E2E (runs on PRs, after unit tests pass)
  # ─────────────────────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://finplan:finplan_dev_password@localhost:5432/finplan_dev
      JWT_SECRET: test-jwt-secret-that-is-at-least-32-characters-long-for-testing
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-that-is-at-least-32-characters-long-for-testing
      COOKIE_SECRET: test-cookie-secret-that-is-at-least-32-characters-long-for-testing
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
      CI: "true"
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/frontend/package.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: cd apps/frontend && bunx playwright install --with-deps chromium

      - name: Start Docker compose stack
        run: docker compose -f docker-compose.dev.yml up -d --wait
        timeout-minutes: 3

      - name: Reset DB and seed E2E baseline
        run: docker compose -f docker-compose.dev.yml exec -T backend bun run db:reset-e2e

      - name: Run Playwright
        run: cd apps/frontend && bunx playwright test

      - name: Upload Playwright artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          retention-days: 7

      - name: Stop Docker compose stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # ─────────────────────────────────────────
  # Security Audit (runs on PRs)
  # ─────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        # continue-on-error suppresses the 1 known moderate: ajv ReDoS (GHSA-2g4f-4pwh-qvx6)
        # via ESLint's internal ajv v6 dependency. ESLint uses ajv v6-only APIs that are
        # incompatible with v8 — forcing v8 crashes the linter at runtime. Suppressed until
        # ESLint migrates to ajv v8 internally: https://github.com/eslint/eslint/issues/18084
        run: bun audit
        continue-on-error: true

  # ─────────────────────────────────────────
  # Compile Check (runs on PRs)
  # ─────────────────────────────────────────
  check-compile:
    name: Check Compile
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    env:
      DATABASE_URL: postgresql://finplan:unused@localhost:5432/unused

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && bunx prisma generate

      - name: Build all packages
        run: bun run build

  # ─────────────────────────────────────────
  # Frontend bundle size budget (runs on PRs)
  # ─────────────────────────────────────────
  frontend-perf-size:
    name: Frontend Bundle Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [check-compile]

    env:
      DATABASE_URL: postgresql://finplan:unused@localhost:5432/unused

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && bunx prisma generate

      - name: Build all packages
        run: bun run build

      - name: Check bundle sizes
        run: cd apps/frontend && bun run size

  # ─────────────────────────────────────────
  # Lighthouse CI (runs on PRs)
  # ─────────────────────────────────────────
  frontend-perf-lhci:
    name: Frontend Lighthouse
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [check-compile]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finplan
          POSTGRES_PASSWORD: finplan_dev_password
          POSTGRES_DB: finplan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finplan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://finplan:finplan_dev_password@localhost:5432/finplan_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-that-is-at-least-32-characters-long-for-testing
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-that-is-at-least-32-characters-long-for-testing
      COOKIE_SECRET: test-cookie-secret-that-is-at-least-32-characters-long-for-testing
      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/backend && bunx prisma generate

      - name: Push schema to test database
        run: cd apps/backend && bunx prisma db push

      - name: Seed test data
        run: cd apps/backend && bun run db:seed

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Export CHROME_PATH
        run: echo "CHROME_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV

      - name: Build all packages
        run: bun run build

      - name: Start backend
        run: cd apps/backend && bun run start &

      - name: Start frontend preview
        run: cd apps/frontend && bunx vite preview --port 3000 --host 127.0.0.1 &

      - name: Wait for stack to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000 > /dev/null 2>&1 && \
            curl -sf http://127.0.0.1:3001/health > /dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "Stack failed to start within 60s" && exit 1

      - name: Run Lighthouse CI
        run: cd apps/frontend && bun run lhci

      - name: Upload LHCI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-reports
          path: apps/frontend/.lighthouseci/
          retention-days: 14
          include-hidden-files: true

  # ─────────────────────────────────────────
  # Deploy (runs on push to main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    environment: PROD

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.COOLIFY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Trigger Coolify deploy
        run: ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 gabriel@95.146.81.51
