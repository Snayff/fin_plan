services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: finplan-postgres-dev
    environment:
      POSTGRES_USER: finplan
      POSTGRES_PASSWORD: finplan_dev_password
      POSTGRES_DB: finplan_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finplan"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finplan-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: finplan-backend-dev
    ports:
      - "3001:3001"
    environment:
      # Database
      DATABASE_URL: postgresql://finplan:finplan_dev_password@postgres:5432/finplan_dev
      # JWT Secrets (change these in production!)
      JWT_SECRET: your-super-secret-jwt-key-min-32-chars-long-dev
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-min-32-chars-long-dev
      # Cookie Secret (for @fastify/cookie)
      COOKIE_SECRET: your-super-secret-cookie-key-min-32-chars-dev
      # CORS
      CORS_ORIGIN: http://localhost:3000
      # Environment
      NODE_ENV: development
    command: sh -c "cd /workspace && bun install && cd /workspace/apps/backend && bunx prisma migrate deploy && bunx prisma generate && bun src/db/seed.ts && bunx nodemon --legacy-watch --watch src --watch ../../packages/shared/src --ext ts --exec 'bun src/server.ts'"
    volumes:
      # Mount source code for hot reload
      - ./apps/backend/src:/workspace/apps/backend/src
      - ./apps/backend/prisma:/workspace/apps/backend/prisma
      - ./apps/backend/prisma.config.ts:/workspace/apps/backend/prisma.config.ts:ro
      - ./packages/shared/src:/workspace/packages/shared/src
      # Mount package manifests so `bun install` picks up new deps without a full image rebuild
      - ./package.json:/workspace/package.json:ro
      - ./apps/backend/package.json:/workspace/apps/backend/package.json:ro
      - ./packages/shared/package.json:/workspace/packages/shared/package.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finplan-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    container_name: finplan-frontend-dev
    ports:
      - "3000:3000"
    environment:
      # Vite proxy target - server-side, uses Docker network hostname
      BACKEND_URL: http://backend:3001
      # Development mode
      NODE_ENV: development
    command: sh -c "cd /workspace && bun install && cd /workspace/apps/frontend && bun run dev -- --host 0.0.0.0"
    volumes:
      # Mount source code for hot reload
      - ./apps/frontend/src:/workspace/apps/frontend/src
      - ./apps/frontend/index.html:/workspace/apps/frontend/index.html
      - ./apps/frontend/vite.config.ts:/workspace/apps/frontend/vite.config.ts
      - ./apps/frontend/tailwind.config.js:/workspace/apps/frontend/tailwind.config.js
      - ./apps/frontend/postcss.config.js:/workspace/apps/frontend/postcss.config.js
      - ./packages/shared/src:/workspace/packages/shared/src
      # Mount package manifests so `bun install` picks up new deps without a full image rebuild
      - ./package.json:/workspace/package.json:ro
      - ./apps/frontend/package.json:/workspace/apps/frontend/package.json:ro
      - ./packages/shared/package.json:/workspace/packages/shared/package.json:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finplan-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  finplan-network:
    driver: bridge
